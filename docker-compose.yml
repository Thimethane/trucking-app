services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "docker-dev-secret-change-me"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped

